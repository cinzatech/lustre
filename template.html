<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lustre — {{.Head}}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v={{.Version}}">
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="sb-header">
      <div class="sb-logo"><span>lustre</span></div>
      <div class="sb-branches">
        <span class="ref" id="sb-base">{{.Base}}</span>
        <span class="arrow">→</span>
        <span class="ref" id="sb-head">{{.Head}}</span>
      </div>
    </div>
    <div class="sb-status">
      <span><span class="count" id="sb-count">…</span> files changed</span>
      <span class="sb-indicator" id="sb-indicator"></span>
    </div>
    <div class="sb-files" id="sb-files"></div>
    <div class="sb-footer">
      <span class="sb-total" id="sb-total"></span>
      <button class="theme-btn" id="btn-theme" title="Toggle theme">◑</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="loading-state" id="loading">Loading diffs…</div>
    <div id="diffs"></div>
  </main>
</div>

<script src="/static/app.js?v={{.Version}}"></script>

</body>
</html>
