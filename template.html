<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lustre — {{.Head}}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #f4f6f6;
  --text: #192424;
  --text-2: #5c7070;
  --text-3: #96acac;
  --border: #d6e0e0;
  --accent: #0e7c7b;
  --accent-t: #fff;
  --surface: #fafcfc;
  --hover: rgba(14,124,123,0.04);
  --green: #1a8c46;
  --green-dim: rgba(26,140,70,0.1);
  --red: #b91c1c;
  --red-dim: rgba(185,28,28,0.08);
  --input-bg: #eaf0f0;
  --font: 'Nunito', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --sidebar-w: 280px;

  --bg-gutter: #eef2f2;
  --bg-added: rgba(26,140,70,0.06);
  --bg-removed: rgba(185,28,28,0.05);
  --bg-added-gutter: rgba(26,140,70,0.10);
  --bg-removed-gutter: rgba(185,28,28,0.08);
  --bg-highlight-add: rgba(26,140,70,0.20);
  --bg-highlight-rem: rgba(185,28,28,0.18);
  --bg-empty: repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(150,172,172,0.06) 4px,rgba(150,172,172,0.06) 8px);

  --syn-keyword: #7c3aed;
  --syn-string: #0e7c7b;
  --syn-type: #0369a1;
  --syn-delimiter: #64748b;
  --syn-normal: #192424;
  --syn-comment: #96acac;
}

html.dark {
  --bg: #0c1212;
  --text: #cedddd;
  --text-2: #7a9090;
  --text-3: #4a5c5c;
  --border: #243030;
  --accent: #38b2ac;
  --accent-t: #0c1212;
  --surface: #151c1c;
  --hover: rgba(56,178,172,0.05);
  --green: #3dd97a;
  --green-dim: rgba(61,217,122,0.1);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.08);
  --input-bg: #1c2626;
  --sidebar-w: 280px;

  --bg-gutter: #111818;
  --bg-added: rgba(61,217,122,0.06);
  --bg-removed: rgba(248,113,113,0.05);
  --bg-added-gutter: rgba(61,217,122,0.10);
  --bg-removed-gutter: rgba(248,113,113,0.08);
  --bg-highlight-add: rgba(61,217,122,0.22);
  --bg-highlight-rem: rgba(248,113,113,0.20);
  --bg-empty: repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(74,92,92,0.10) 4px,rgba(74,92,92,0.10) 8px);

  --syn-keyword: #c4b5fd;
  --syn-string: #38b2ac;
  --syn-type: #7dd3fc;
  --syn-delimiter: #94a3b8;
  --syn-normal: #cedddd;
  --syn-comment: #4a5c5c;
}

html {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

body { min-height: 100dvh; display: flex; flex-direction: column; }

/* --- layout --- */
.shell { display: flex; flex: 1; min-height: 0; }

/* --- sidebar --- */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  position: sticky;
  top: 0;
}

.sb-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.sb-logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.04em;
  margin-bottom: 8px;
}

.sb-logo span { color: var(--accent); }

.sb-branches {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-2);
}

.sb-branches .ref {
  padding: 1px 6px;
  background: var(--input-bg);
  border-radius: 3px;
  color: var(--text);
  font-weight: 600;
}

.sb-branches .arrow { color: var(--text-3); }

.sb-status {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-3);
}

.sb-status .count { font-weight: 600; color: var(--text-2); }

.sb-indicator {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  border: 1.5px solid var(--text-3);
  transition: all .3s;
}

.sb-indicator.live {
  border-color: transparent;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.sb-files {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.sb-file {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-2);
  transition: background .1s, color .1s;
  border-left: 2px solid transparent;
}

.sb-file:hover { background: var(--hover); color: var(--text); }
.sb-file.active { border-left-color: var(--accent); color: var(--text); background: var(--hover); }

.sb-file .icon {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}

.sb-file .icon.c { color: var(--accent); }
.sb-file .icon.a { color: var(--green); }
.sb-file .icon.r { color: var(--red); }

.sb-file .name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--mono);
  font-size: 12px;
  direction: rtl;
  text-align: left;
}

.sb-file .stats {
  font-family: var(--mono);
  font-size: 11px;
  flex-shrink: 0;
  color: var(--text-3);
}

.sb-file .stats .a { color: var(--green); }
.sb-file .stats .r { color: var(--red); }

.sb-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.theme-btn {
  background: none;
  border: 1px solid var(--border);
  width: 28px;
  height: 28px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .15s;
}

.theme-btn:hover { border-color: var(--text-3); }

.sb-total {
  font-size: 12px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}

.sb-total b { color: var(--text-2); font-weight: 600; }

/* --- main content --- */
.main {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  height: 100dvh;
  padding: 16px 20px 80px;
}

/* --- diff cards --- */
.diff-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 16px;
}

.diff-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
}

.diff-header .filepath {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}

.diff-header .lang-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--hover);
  color: var(--accent);
  font-weight: 600;
}

.diff-header .stat {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

.diff-header .stat .add { color: var(--green); font-weight: 600; }
.diff-header .stat .rem { color: var(--red); font-weight: 600; }

.diff-container { overflow-x: auto; }

table.diff {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 20px;
  table-layout: fixed;
}

table.diff col.gutter { width: 52px; }
table.diff col.code   { width: calc(50% - 52px); }

table.diff td {
  vertical-align: top;
  padding: 0 12px;
  white-space: pre;
  overflow: hidden;
  border: none;
}

table.diff td.gutter {
  background: var(--bg-gutter);
  color: var(--text-3);
  text-align: right;
  padding: 0 8px;
  user-select: none;
  font-size: 12px;
  border-right: 1px solid var(--border);
}

table.diff td.divider { width: 1px; padding: 0; background: var(--border); }

td.code.added   { background: var(--bg-added); }
td.gutter.added { background: var(--bg-added-gutter); }
td.code.removed   { background: var(--bg-removed); }
td.gutter.removed { background: var(--bg-removed-gutter); }
td.code.empty-cell { background: var(--bg-empty); }

.tok-change-add { background: var(--bg-highlight-add); border-radius: 2px; }
.tok-change-rem { background: var(--bg-highlight-rem); border-radius: 2px; }

.tok-keyword   { color: var(--syn-keyword); }
.tok-string    { color: var(--syn-string); }
.tok-type      { color: var(--syn-type); }
.tok-delimiter { color: var(--syn-delimiter); }
.tok-normal    { color: var(--syn-normal); }
.tok-comment   { color: var(--syn-comment); font-style: italic; }

/* --- states --- */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-3);
  font-size: 14px;
}

.empty-state .big { font-size: 28px; margin-bottom: 12px; }

.loading-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-3);
  font-size: 14px;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
</style>
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="sb-header">
      <div class="sb-logo"><span>lustre</span></div>
      <div class="sb-branches">
        <span class="ref" id="sb-base">{{.Base}}</span>
        <span class="arrow">→</span>
        <span class="ref" id="sb-head">{{.Head}}</span>
      </div>
    </div>
    <div class="sb-status">
      <span><span class="count" id="sb-count">…</span> files changed</span>
      <span class="sb-indicator" id="sb-indicator"></span>
    </div>
    <div class="sb-files" id="sb-files"></div>
    <div class="sb-footer">
      <span class="sb-total" id="sb-total"></span>
      <button class="theme-btn" id="btn-theme" title="Toggle theme">◑</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="loading-state" id="loading">Loading diffs…</div>
    <div id="diffs"></div>
  </main>
</div>

<script>
/* ─── theme ─── */
(function() {
  const stored = localStorage.getItem('lustre-theme');
  if (stored === 'dark' || (!stored && matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.classList.add('dark');
  }
})();

document.getElementById('btn-theme').addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('lustre-theme',
    document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});

/* ─── rendering ─── */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderLineContent(fullLine, changes, side) {
  if (!changes || changes.length === 0) {
    return `<span class="tok-normal">${esc(fullLine)}</span>`;
  }
  const changeCls = side === 'add' ? 'tok-change-add' : 'tok-change-rem';
  const sorted = [...changes].sort((a, b) => a.start - b.start);
  let html = '', cursor = 0;
  for (const ch of sorted) {
    if (ch.start > cursor)
      html += `<span class="tok-normal">${esc(fullLine.slice(cursor, ch.start))}</span>`;
    html += `<span class="tok-${ch.highlight} ${changeCls}">${esc(ch.content)}</span>`;
    cursor = ch.end;
  }
  if (cursor < fullLine.length)
    html += `<span class="tok-normal">${esc(fullLine.slice(cursor))}</span>`;
  return html;
}

function renderFile(file) {
  const diff = file.diff;
  if (!diff || diff === null || !diff.aligned_lines) {
    // Added or removed file without structural diff — show raw
    return renderPlainFile(file);
  }

  const oldLines = (file.old_src || '').split('\n');
  const newLines = (file.new_src || '').split('\n');

  const lhsChanges = new Map(), rhsChanges = new Map();
  const lhsChanged = new Set(), rhsChanged = new Set();

  if (diff.chunks) {
    for (const chunk of diff.chunks) {
      for (const entry of chunk) {
        if (entry.lhs) {
          const ln = entry.lhs.line_number;
          if (entry.lhs.changes?.length) {
            lhsChanges.set(ln, (lhsChanges.get(ln) || []).concat(entry.lhs.changes));
            lhsChanged.add(ln);
          }
        }
        if (entry.rhs) {
          const ln = entry.rhs.line_number;
          if (entry.rhs.changes?.length) {
            rhsChanges.set(ln, (rhsChanges.get(ln) || []).concat(entry.rhs.changes));
            rhsChanged.add(ln);
          }
        }
        if (entry.rhs && !entry.lhs) rhsChanged.add(entry.rhs.line_number);
        if (entry.lhs && !entry.rhs) lhsChanged.add(entry.lhs.line_number);
      }
    }
  }

  const addedLines = new Set(), removedLines = new Set();
  for (const [o, n] of diff.aligned_lines) {
    if (o === null) addedLines.add(n);
    if (n === null) removedLines.add(o);
  }

  let rows = '';
  for (const [oldLn, newLn] of diff.aligned_lines) {
    const isAdded = oldLn === null;
    const isRemoved = newLn === null;
    const isLhsChanged = oldLn !== null && lhsChanged.has(oldLn);
    const isRhsChanged = newLn !== null && rhsChanged.has(newLn);

    if (isAdded) {
      const t = newLines[newLn] || '';
      const ch = rhsChanges.get(newLn);
      const code = ch ? renderLineContent(t, ch, 'add') : `<span class="tok-normal">${esc(t)}</span>`;
      rows += `<tr><td class="gutter"></td><td class="code empty-cell"></td>`
        + `<td class="divider"></td>`
        + `<td class="gutter added">${newLn+1}</td><td class="code added">${code}</td></tr>`;
      continue;
    }
    if (isRemoved) {
      const t = oldLines[oldLn] || '';
      const ch = lhsChanges.get(oldLn);
      const code = ch ? renderLineContent(t, ch, 'rem') : `<span class="tok-normal">${esc(t)}</span>`;
      rows += `<tr><td class="gutter removed">${oldLn+1}</td><td class="code removed">${code}</td>`
        + `<td class="divider"></td>`
        + `<td class="gutter"></td><td class="code empty-cell"></td></tr>`;
      continue;
    }

    const lt = oldLines[oldLn] || '', rt = newLines[newLn] || '';
    const lc = lhsChanges.get(oldLn), rc = rhsChanges.get(newLn);
    const leftCode = lc ? renderLineContent(lt, lc, 'rem') : `<span class="tok-normal">${esc(lt)}</span>`;
    const rightCode = rc ? renderLineContent(rt, rc, 'add') : `<span class="tok-normal">${esc(rt)}</span>`;
    const lCls = isLhsChanged ? ' removed' : '';
    const rCls = isRhsChanged ? ' added' : '';

    rows += `<tr>`
      + `<td class="gutter${lCls}">${oldLn+1}</td><td class="code${lCls}">${leftCode}</td>`
      + `<td class="divider"></td>`
      + `<td class="gutter${rCls}">${newLn+1}</td><td class="code${rCls}">${rightCode}</td>`
      + `</tr>`;
  }

  return { html: rows, added: addedLines.size, removed: removedLines.size };
}

function renderPlainFile(file) {
  const lines = (file.status === 'added' ? file.new_src : file.old_src || '').split('\n');
  const cls = file.status === 'added' ? 'added' : 'removed';
  let rows = '';
  for (let i = 0; i < lines.length; i++) {
    const code = `<span class="tok-normal">${esc(lines[i])}</span>`;
    if (file.status === 'added') {
      rows += `<tr><td class="gutter"></td><td class="code empty-cell"></td>`
        + `<td class="divider"></td>`
        + `<td class="gutter added">${i+1}</td><td class="code added">${code}</td></tr>`;
    } else {
      rows += `<tr><td class="gutter removed">${i+1}</td><td class="code removed">${code}</td>`
        + `<td class="divider"></td>`
        + `<td class="gutter"></td><td class="code empty-cell"></td></tr>`;
    }
  }
  return { html: rows, added: file.status === 'added' ? lines.length : 0, removed: file.status === 'removed' ? lines.length : 0 };
}

function renderAll(data) {
  const diffsEl = document.getElementById('diffs');
  const filesEl = document.getElementById('sb-files');
  const loading = document.getElementById('loading');

  if (!data.files || data.files.length === 0) {
    loading.style.display = 'none';
    diffsEl.innerHTML = '<div class="empty-state"><div class="big">✓</div>No changes between branches.</div>';
    filesEl.innerHTML = '';
    document.getElementById('sb-count').textContent = '0';
    document.getElementById('sb-total').innerHTML = '';
    return;
  }

  loading.style.display = 'none';
  let totalAdded = 0, totalRemoved = 0;
  let diffsHTML = '';
  let filesHTML = '';

  for (let i = 0; i < data.files.length; i++) {
    const file = data.files[i];
    const result = renderFile(file);
    totalAdded += result.added;
    totalRemoved += result.removed;

    const lang = file.diff?.language || file.language || '';

    // sidebar entry
    const statusIcon = file.status === 'added' ? 'A' : file.status === 'removed' ? 'D' : 'M';
    const statusCls = file.status === 'added' ? 'a' : file.status === 'removed' ? 'r' : 'c';
    filesHTML += `<div class="sb-file" data-idx="${i}">`
      + `<span class="icon ${statusCls}">${statusIcon}</span>`
      + `<span class="name">${esc(file.path)}</span>`
      + `<span class="stats"><span class="a">+${result.added}</span> <span class="r">-${result.removed}</span></span>`
      + `</div>`;

    // diff card
    diffsHTML += `<div class="diff-card" id="file-${i}">`
      + `<div class="diff-header">`
      + `<span class="filepath">${esc(file.path)}</span>`
      + (lang ? `<span class="lang-badge">${esc(lang)}</span>` : '')
      + `<span class="stat"><span class="add">+${result.added}</span>&ensp;<span class="rem">−${result.removed}</span></span>`
      + `</div>`
      + `<div class="diff-container"><table class="diff"><colgroup>`
      + `<col class="gutter"><col class="code"><col style="width:1px"><col class="gutter"><col class="code">`
      + `</colgroup><tbody>${result.html}</tbody></table></div>`
      + `</div>`;
  }

  diffsEl.innerHTML = diffsHTML;
  filesEl.innerHTML = filesHTML;
  document.getElementById('sb-count').textContent = data.files.length;
  document.getElementById('sb-total').innerHTML =
    `<b>+${totalAdded}</b> / <b>-${totalRemoved}</b>`;

  // sidebar click → scroll
  filesEl.querySelectorAll('.sb-file').forEach(el => {
    el.addEventListener('click', () => {
      const idx = el.dataset.idx;
      document.getElementById(`file-${idx}`)
        .scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // intersection observer for active sidebar highlight
  setupScrollSpy(data.files.length);
}

function setupScrollSpy(count) {
  const mainEl = document.getElementById('main');
  const observer = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (entry.isIntersecting) {
        const idx = entry.target.id.replace('file-', '');
        document.querySelectorAll('.sb-file').forEach(el => el.classList.remove('active'));
        const active = document.querySelector(`.sb-file[data-idx="${idx}"]`);
        if (active) active.classList.add('active');
      }
    }
  }, { root: mainEl, rootMargin: '-10% 0px -80% 0px', threshold: 0 });

  for (let i = 0; i < count; i++) {
    const el = document.getElementById(`file-${i}`);
    if (el) observer.observe(el);
  }
}

/* ─── data fetching ─── */
async function fetchDiffs() {
  try {
    const res = await fetch('/api/diffs');
    const data = await res.json();
    renderAll(data);
  } catch (e) {
    console.error('fetch failed:', e);
  }
}

/* ─── SSE ─── */
function connectSSE() {
  const indicator = document.getElementById('sb-indicator');
  const evtSource = new EventSource('/events');

  evtSource.addEventListener('connected', () => {
    indicator.classList.add('live');
  });

  evtSource.addEventListener('reload', () => {
    fetchDiffs();
  });

  evtSource.onerror = () => {
    indicator.classList.remove('live');
    // reconnect after a delay
    setTimeout(() => {
      evtSource.close();
      connectSSE();
    }, 2000);
  };
}

/* ─── init ─── */
fetchDiffs();
connectSSE();
</script>

</body>
</html>
